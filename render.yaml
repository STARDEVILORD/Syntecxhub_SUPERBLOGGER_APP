services:
  # Backend API
  - type: web
    name: superbloger-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://superbloger.onrender.com
    autoDeploy: true

  # Frontend
  - type: web
    name: superbloger
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        value: https://superbloger-api.onrender.com/api
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
